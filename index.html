    const GAP=6;

    function packRows(photos,aspects,containerW,targetH){
      if(!containerW||!photos.length)return[];
      const rows=[];
      let bucket=[];
      let bucketNatW=0;
      for(const p of photos){
        const ar=aspects[p.id]||(p.tall?2/3:3/2);
        const natW=ar*targetH;
        const gapAdd=bucket.length>0?GAP:0;
        if(bucket.length>0&&bucketNatW+gapAdd+natW>containerW+0.5){
          rows.push(buildRow(bucket,aspects,containerW,targetH,false));
          bucket=[p];
          bucketNatW=natW;
        }else{
          bucket.push(p);
          bucketNatW+=gapAdd+natW;
        }
      }
      if(bucket.length){
        const isLast=true;
        rows.push(buildRow(bucket,aspects,containerW,targetH,isLast));
      }
      return rows;
    }

    function buildRow(items,aspects,containerW,targetH,isLast){
      const totalGap=(items.length-1)*GAP;
      const availW=containerW-totalGap;
      const natWs=items.map(p=>(aspects[p.id]||(p.tall?2/3:3/2))*targetH);
      const totalNatW=natWs.reduce((a,b)=>a+b,0);
      let scale=isLast?1:availW/totalNatW;
      if(isLast&&scale>1.3)scale=1;
      const h=Math.round(targetH*scale);
      const rawWidths=natWs.map(w=>w*scale);
      const floored=rawWidths.map(w=>Math.floor(w));
      const deficit=availW-floored.reduce((a,b)=>a+b,0);
      const widths=floored.map((w,i)=>i===0?w+Math.round(deficit):w);
      return{items,height:h,widths};
    }

    function Compass(){

        {[95,75,55,30,8].map(r=><circle key={r} cx="100" cy="100" r={r} stroke="#c8a55a" strokeWidth=".5" fill="none"/>)}
        {m.map(d=>{const r=(d-90)*Math.PI/180,c=Math.cos(r),s=Math.sin(r);return(<g key={d}><line x1={100+8*c} y1={100+8*s} x2={100+93*c} y2={100+93*s} stroke="#c8a55a" strokeWidth=".3"/><line x1={100+78*c} y1={100+78*s} x2={100+93*c} y2={100+93*s} stroke="#c8a55a" strokeWidth="1.5"/></g>);})}
        {i.map(d=>{const r=(d-90)*Math.PI/180,c=Math.cos(r),s=Math.sin(r);return<line key={d} x1={100+85*c} y1={100+85*s} x2={100+93*c} y2={100+93*s} stroke="#c8a55a" strokeWidth=".5"/>;})}

    function WildlifeGallery({onOpen}){
      const [activeTab,setActiveTab]=useState("all");
      const [fadeKey,setFadeKey]=useState(0);
      const [aspects,setAspects]=useState(()=>{
        const m={};
        WILDLIFE.forEach(p=>{m[p.id]=p.tall?2/3:3/2;});
        return m;
      });
      const [rows,setRows]=useState([]);
      const containerRef=useRef(null);

      useEffect(()=>{
        WILDLIFE.forEach(p=>{
          const img=new Image();
          img.onload=()=>{
            if(img.naturalWidth&&img.naturalHeight){
              setAspects(prev=>({...prev,[p.id]:img.naturalWidth/img.naturalHeight}));
            }
          };
          img.onerror=()=>{};
          img.src=p.img;
        });
      },[]);

      const filtered=useMemo(()=>{
        if(activeTab==="all")return WILDLIFE;
        const cats=WILDLIFE_GROUPS[activeTab]||[];
        return WILDLIFE.filter(p=>cats.includes(p.cat));
      },[activeTab]);

      const tabCounts=useMemo(()=>{
        const counts={all:WILDLIFE.length};
        Object.entries(WILDLIFE_GROUPS).forEach(([key,cats])=>{
          counts[key]=WILDLIFE.filter(p=>cats.includes(p.cat)).length;
        });
        return counts;
      },[]);

      const repack=useCallback(()=>{
        const el=containerRef.current;
        if(!el)return;
        const cw=el.clientWidth-2*GAP;
        if(!cw)return;
        const bp=window.innerWidth>900?340:window.innerWidth>540?230:165;
        setRows(packRows(filtered,aspects,cw,bp));
      },[filtered,aspects]);

      useLayoutEffect(()=>{
        repack();
        const el=containerRef.current;
        if(!el)return;
        const ro=new ResizeObserver(repack);
        ro.observe(el);
        return()=>ro.disconnect();
      },[repack]);

      const handleTab=(tab)=>{
        setActiveTab(tab);
        setFadeKey(k=>k+1);
      };

      return(
        <>

                      <div

                        tabIndex="0"
                        onKeyDown={e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();onOpen(e,wi);}}}
                        aria-label={`Open ${p.title}`}
                      >
                        <img src={p.img} alt={p.title} className="gph"/>
                        <div className="gov">
                          <div className="ocat">{p.cat}</div>
                          <div className="ottl">{p.title}</div>
                          <div className="oloc">ᛟ {p.loc}</div>
                          <div className="ostr">{p.story}</div>
                        </div>

                    );
                  })}

              ))}
            </div>
          </div>
        </>
      );
    }

    function PhotoLightbox({photo,origin,onClose,onPrev,onNext}){
      const titleRef=useRef(null),metaRef=useRef(null),imageRef=useRef(null);
      const [morph,setMorph]=useState({ready:false,style:{}});
      const [closing,setClosing]=useState(false);
      const closeTimerRef=useRef(null);

      const triggerClose=useCallback(()=>{
        if(closing)return;
        setClosing(true);
        closeTimerRef.current=setTimeout(()=>onClose(),420);
      },[closing,onClose]);

      useEffect(()=>()=>clearTimeout(closeTimerRef.current),[]);

      useEffect(()=>{
        setMorph({ready:false,style:{}});
        setClosing(false);
        const frame=requestAnimationFrame(()=>{
          const tr=titleRef.current?.getBoundingClientRect();
          const mr=metaRef.current?.getBoundingClientRect();
          const ir=imageRef.current?.getBoundingClientRect();
          if(!tr||!mr||!ir){setMorph({ready:true,style:{}});return;}
          const style={};
          if(origin?.title){
            style["--title-x"]=`${origin.title.left-tr.left}px`;
            style["--title-y"]=`${origin.title.top-tr.top}px`;
            style["--title-scale"]=clamp(origin.title.width/tr.width,.12,.55);
          }
          if(origin?.meta){
            style["--meta-x"]=`${origin.meta.left-mr.left}px`;
            style["--meta-y"]=`${origin.meta.top-mr.top}px`;
            style["--meta-scale"]=clamp(origin.meta.width/mr.width,.35,.85);
          }
          if(origin?.image){
            style["--image-x"]=`${origin.image.left-ir.left}px`;
            style["--image-y"]=`${origin.image.top-ir.top}px`;
            style["--image-scale"]=clamp(origin.image.width/ir.width,.12,1);
          }
          setMorph({ready:true,style});
        });
        return()=>cancelAnimationFrame(frame);
      },[photo,origin]);

      useEffect(()=>{
        const onKey=e=>{
          if(e.key==="Escape"){e.preventDefault();triggerClose();}
          if(e.key==="ArrowLeft"&&!closing){e.preventDefault();onPrev();}
          if(e.key==="ArrowRight"&&!closing){e.preventDefault();onNext();}
        };
        window.addEventListener("keydown",onKey);
        return()=>window.removeEventListener("keydown",onKey);
      },[triggerClose,closing,onPrev,onNext]);

      const classes=[
        "lightbox",
        morph.ready?"ready":"",
        origin&&!closing?"morphing":"",
        closing?"closing":"",
      ].filter(Boolean).join(" ");

      return(
        <div className={classes} role="dialog" aria-modal="true" aria-label={photo.title} onClick={triggerClose} style={morph.style}>
          <button className="lbarrow prev" type="button" onClick={e=>{e.stopPropagation();if(!closing)onPrev();}} aria-label="Previous photo">‹</button>
          <button className="lbarrow next" type="button" onClick={e=>{e.stopPropagation();if(!closing)onNext();}} aria-label="Next photo">›</button>
          <div className="lbpanel">
            <div className="lbtop">
              <div className="lbtitle" ref={titleRef}>{photo.title}</div>
            </div>
            <div className="lbphoto"><img ref={imageRef} src={photo.img} alt={photo.title} onClick={e=>e.stopPropagation()}/></div>
            <div className="lbmeta" ref={metaRef}>
              <div className="lbcat">{photo.cat}</div>
              <div className="lbcopy">
                <div className="lbloc">ᛟ {photo.loc}</div>
                <div className="lbstory">{photo.story}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

            </div>
            <div className="metrics">
              {[{n:"30",a:"+",l:"Instagram Posts"},{n:"3",a:"",l:"Platforms"},{n:"8",a:"mo",l:"Duration"},{n:"2",a:"",l:"Languages"}].map((m,i)=>(<div className="met" key={i}><div className="mnum">{m.n}<span>{m.a}</span></div><div className="mlbl">{m.l}</div></div>))}
            </div>
            <div className="cgrid">
              {CORPORATE.map(p=>(<a className="pw" key={p.id} href={p.link||IG} target="_blank" rel="noopener noreferrer">
                <div className="ph">
                  <div className="ppill"><div className="ppin"/></div>
                  <div className="igh"><div className="igav"/><div className="igun">laurentianu</div><div className="igvr"/></div>
                  <div className="igim"><img src={p.img} alt={p.event}/></div>
                  <div className="igft"><div className="iglk"><span className="ighrt">♥</span> {p.likes.toLocaleString()}</div><div className="igcp"><strong>laurentianu</strong> · {p.date}</div></div>
                </div>
                <div className="pme"><div className="pev">{p.event}</div><div className="pdt">{p.date}</div></div>
              </a>))}
            </div>
            <div className="ig-cta"><a href={IG} target="_blank" rel="noopener noreferrer">ᛟ View full work @laurentianu on Instagram</a></div>
            <GoldDiv/><SiteFooter/>
          </section>

          <section className="pg inner">
            <div className="shead"><Corners/>
              <div className="seye">ᛟ 03 — The Photographer</div>
              <h2 className="stitle">About</h2>
            </div>
            <div className="awrap">
              <div>
                <h3 className="ahl">Behind<br/>the <em>lens.</em></h3>
                <p className="ap">Vinit Patel is a wildlife photographer and social media content creator based in Calgary, Alberta. His work spans the urban sanctuaries of Calgary's river pathways, the alpine wilderness of Banff National Park, the boreal forests of Northern Ontario, and the mountain rivers of Himachal Pradesh, India.</p>
                <p className="ap">Trained through practice rather than institution, Vinit's photography is defined by patience, ecological curiosity, and a cinematic eye developed across thousands of hours in the field. His corporate work at Laurentian University demonstrated that same eye applied to institutional storytelling — bilingual, culturally sensitive, and engagement-driven.</p>
              </div>
              <div className="facts">
                {FACTS.map((f,i)=>(<div className="fact" key={i}>
                  <div className="flbl">{f.l}</div>
                  {f.email?<a href={`mailto:${f.v}`} className="femail">{f.v}</a>:<div className="fval">{f.v}</div>}
                </div>))}
              </div>
            </div>
            <GoldDiv/><SiteFooter/>
          </section>

        </div>
        {openPhoto&&<PhotoLightbox photo={WILDLIFE[openPhoto.index]} origin={openPhoto.origin} onClose={closePhoto} onPrev={showPrevPhoto} onNext={showNextPhoto}/>}
      </>);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Portfolio/>);
  </script>
</body>
</html>
